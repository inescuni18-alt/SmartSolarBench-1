<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Solar Bench - Berat</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f3f5f7;
    text-align:center;
}
h1{
    margin-top:20px;
    color:#0b7a75;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.card{
    background:white;
    width:250px;
    margin:15px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.chart-container{
    width:80%;
    margin:40px auto;
}
</style>
</head>

<body>

<h1>Smart Solar Bench - Live Dashboards</h1>
<h2 id="globalStatus">Loading data...</h2>

<div class="container">

<div class="card">
<h3>Temperatura (°C)</h3>
<canvas id="tempGauge"></canvas>
<p id="tempValue"></p>
<p id="tempStatus"></p>
</div>

<div class="card">
<h3>Lagështia (%)</h3>
<canvas id="humGauge"></canvas>
<p id="humValue"></p>
<p id="humStatus"></p>
</div>

<div class="card">
<h3>Presioni (hPa)</h3>
<canvas id="presGauge"></canvas>
<p id="presValue"></p>
<p id="presStatus"></p>
</div>

<div class="card">
<h3>Cilësia e Ajrit</h3>
<canvas id="gasGauge"></canvas>
<p id="gasValue"></p>
<p id="gasStatus"></p>
</div>

<div class="card">
<h3>Zhurma (dB)</h3>
<canvas id="soundGauge"></canvas>
<p id="soundValue"></p>
<p id="soundStatus"></p>
</div>

</div>

<div class="chart-container">
<canvas id="tempChart"></canvas>
</div>

<div class="chart-container">
<canvas id="soundChart"></canvas>
</div>

<script>

let tempChart, soundChart;

async function loadData(){

const response = await fetch("https://api.thingspeak.com/channels/3255086/feeds.json?results=200");
const data = await response.json();

const feeds = data.feeds;

if(!feeds || feeds.length === 0){
    document.getElementById("globalStatus").innerHTML = "No data available";
    return;
}

const latest = feeds[feeds.length-1];

let t = parseFloat(latest.field1);
let h = parseFloat(latest.field2);
let p = parseFloat(latest.field3);
let g = parseFloat(latest.field4);
let db = parseFloat(latest.field5);

document.getElementById("tempValue").innerHTML = t + " °C";
document.getElementById("humValue").innerHTML = h + " %";
document.getElementById("presValue").innerHTML = p + " hPa";
document.getElementById("gasValue").innerHTML = g + " kΩ";
document.getElementById("soundValue").innerHTML = db.toFixed(1) + " dB";

document.getElementById("globalStatus").innerHTML = "Data updated live";

// Gauges
createGauge("tempGauge", 0, 50, t);
createGauge("humGauge", 0, 100, h);
createGauge("presGauge", 950, 1050, p);
createGauge("gasGauge", 0, 200, g);
createGauge("soundGauge", 30, 100, db);

// Charts
createTempChart(feeds);
createSoundChart(feeds);

}

function createGauge(id, min, max, value){
var target = document.getElementById(id);
var gauge = new Gauge(target).setOptions({});
gauge.maxValue = max;
gauge.setMinValue(min);
gauge.set(value);
}

function createTempChart(feeds){

let labels = feeds.map(f =>
    new Date(f.created_at).toLocaleTimeString()
);

let temps = feeds.map(f =>
    parseFloat(f.field1)
);

if(tempChart) tempChart.destroy();

tempChart = new Chart(document.getElementById("tempChart"),{
    type: "line",
    data:{
        labels: labels,
        datasets:[{
            label: "Temperature (°C)",
            data: temps,
            borderColor: "#e74c3c"
        }]
    }
});
}

function createSoundChart(feeds){

let labels = feeds.map(f =>
    new Date(f.created_at).toLocaleTimeString()
);

let sounds = feeds.map(f =>
    parseFloat(f.field5)
);

if(soundChart) soundChart.destroy();

soundChart = new Chart(document.getElementById("soundChart"),{
    type: "line",
    data:{
        labels: labels,
        datasets:[{
            label: "Noise (dB)",
            data: sounds,
            borderColor: "#8e44ad"
        }]
    }
});
}

// run first time
loadData();

// refresh every 15 seconds
setInterval(loadData, 15000);

</script>

</body>
</html>
